[build]
  command = "pnpm run build:netlify"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@prisma/client", "@prisma/client-runtime-utils", ".prisma", "pg"]
  included_files = [
    "generated/prisma/**",
    "node_modules/.pnpm/@prisma+*/**",
    "node_modules/.pnpm/.prisma+*/**",
    "node_modules/.pnpm/pg@*/**",
    "node_modules/.pnpm/pg-*/**",
    "node_modules/@prisma/**",
    "node_modules/.prisma/**",
    "node_modules/pg/**",
    "node_modules/pg-*/**"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
