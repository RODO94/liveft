name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter server exec prisma generate

      - name: Lint
        run: |
          pnpm --filter client lint
          pnpm --filter server lint

      - name: Typecheck
        run: |
          pnpm --filter server typecheck

      - name: Build server
        run: pnpm --filter server build:netlify

      - name: Build client
        run: pnpm --filter client build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Link Netlify site
        run: |
          mkdir -p .netlify
          echo '{"siteId":"'"$NETLIFY_SITE_ID"'"}' > .netlify/state.json
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --no-build --dir=client/dist --functions=server/dist/netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
