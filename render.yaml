services:
  - type: web
    name: liveft-api
    runtime: node
    rootDir: ./
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter server exec prisma generate && pnpm --filter server build
    startCommand: node server/dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
