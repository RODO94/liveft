[build.environment]
  NPM_FLAGS = "--version" # Prevent Netlify from auto-installing with npm

[build]
  command = "npm install -g pnpm@10.7.1 && pnpm install --frozen-lockfile && pnpm --filter client build"
  publish = "client/dist"

# SPA fallback — serve index.html for all client routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
