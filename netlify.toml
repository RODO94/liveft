[build]
  command = "pnpm --filter server build:netlify && pnpm --filter client build"
  publish = "client/dist"
  functions = "server/dist/netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.7.1"

# Rewrite API calls to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — serve index.html for all client routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
